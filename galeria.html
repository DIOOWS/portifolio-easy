<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeria de Projetos | Easy Assistência 24h</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<main class="galeria-page">

  <header class="galeria-header">
    <img src="assets/img/logo-easy.png" alt="Easy Assistência 24h" class="galeria-logo">

    <h1>GALERIA DE PROJETOS</h1>
    <p>Alguns serviços executados pela Easy Assistência 24h</p>

    <a href="index.html" class="btn btn-blue galeria-voltar">
      ← Voltar para o início
    </a>
  </header>

  <section class="galeria-grid">
    <img src="assets/img/projetos/p1.jpg" alt="Projeto Easy" onclick="abrirProjeto(this.src)">
    <img src="assets/img/projetos/p2.jpg" alt="Projeto Easy" onclick="abrirProjeto(this.src)">
    <img src="assets/img/projetos/p3.jpg" alt="Projeto Easy" onclick="abrirProjeto(this.src)">
    <img src="assets/img/projetos/p4.jpg" alt="Projeto Easy" onclick="abrirProjeto(this.src)">
    <img src="assets/img/projetos/p5.jpg" alt="Projeto Easy" onclick="abrirProjeto(this.src)">
    <img src="assets/img/projetos/p6.jpg" alt="Projeto Easy" onclick="abrirProjeto(this.src)">
    <img src="assets/img/projetos/p7.jpg" alt="Projeto Easy" onclick="abrirProjeto(this.src)">
    <img src="assets/img/projetos/p8.jpg" alt="Projeto Easy" onclick="abrirProjeto(this.src)">

    <img src="assets/img/projetos/p9.jpg" alt="Projeto Easy" onclick="abrirProjeto(this.src)">
    <img src="assets/img/projetos/p10.jpg" alt="Projeto Easy" onclick="abrirProjeto(this.src)">
  </section>

</main>

<div class="modal-projeto" id="modalProjeto">
  <span class="fechar" onclick="fecharProjeto()">✕</span>
  <img id="imgProjeto" alt="Projeto ampliado">
</div>

<script>
function abrirProjeto(src){
  const modal = document.getElementById("modalProjeto");
  const imagem = document.getElementById("imgProjeto");

  imagem.src = src;
  modal.classList.add("ativo");
}

function fecharProjeto(){
  const modal = document.getElementById("modalProjeto");
  const imagem = document.getElementById("imgProjeto");

  modal.classList.remove("ativo");
  imagem.src = "";
}

document.getElementById("modalProjeto").addEventListener("click", function(e){
  if(e.target.id === "modalProjeto"){
    fecharProjeto();
  }
});

document.addEventListener("keydown", function(e){
  if(e.key === "Escape"){
    fecharProjeto();
  }
});
</script>

</body>
</html>
